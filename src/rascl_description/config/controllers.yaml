controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - shoulder_joint
      - upperarm_joint
      - lowerarm_joint
      - end_effector_joint

    interfaces:
      - position
      - velocity
      - actual_position
      - status_word

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_joint
      - upperarm_joint
      - lowerarm_joint
      - end_effector_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
